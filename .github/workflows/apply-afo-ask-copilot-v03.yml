name: Apply AFO Ask Copilot v0.3

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply verified v0.3 payload
        shell: bash
        run: |
          set -euo pipefail
          cat .afo-v03/chunk-* | base64 --decode | tar -xzf - -C .
          rm -rf .afo-v03
          rm -f .github/workflows/apply-afo-ask-copilot-v03.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Implement v0.3 Copilot Container runtime"
          git push origin HEAD:main
