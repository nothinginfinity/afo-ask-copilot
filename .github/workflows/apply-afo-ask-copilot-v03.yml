name: Clean AFO Ask Copilot v0.3 staging

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Remove completed v0.3 staging artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .afo-v03
          rm -f .github/workflows/apply-afo-ask-copilot-v03.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Remove completed v0.3 staging artifacts"
          git push origin HEAD:main
