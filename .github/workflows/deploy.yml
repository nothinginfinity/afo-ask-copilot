name: Deploy

on:
  workflow_dispatch:
    inputs:
      rollout:
        description: Container rollout strategy
        required: true
        default: immediate
        type: choice
        options:
          - immediate
          - gradual

permissions:
  contents: read

concurrency:
  group: afo-ask-copilot-production
  cancel-in-progress: false

env:
  WRANGLER_VERSION: 4.102.0

jobs:
  deploy:
    name: Deploy Worker and Container
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Validate repository
        run: npm run validate

      - name: Verify bundled Copilot CLI
        run: npm run verify:bundled-cli

      - name: Verify required deployment secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_CONT_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AFO_ASK_COPILOT_TOKEN: ${{ secrets.AFO_ASK_COPILOT_TOKEN }}
          RUNTIME_SHARED_SECRET: ${{ secrets.RUNTIME_SHARED_SECRET }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID AFO_ASK_COPILOT_TOKEN RUNTIME_SHARED_SECRET COPILOT_GITHUB_TOKEN; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Required GitHub Actions secret is missing: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Create ephemeral Worker secrets file
        id: secret-file
        shell: bash
        env:
          AFO_ASK_COPILOT_TOKEN: ${{ secrets.AFO_ASK_COPILOT_TOKEN }}
          RUNTIME_SHARED_SECRET: ${{ secrets.RUNTIME_SHARED_SECRET }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          secret_file="${RUNNER_TEMP}/afo-ask-copilot.secrets.json"
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const secretFile = `${process.env.RUNNER_TEMP}/afo-ask-copilot.secrets.json`;
          const secrets = {
            AFO_ASK_COPILOT_TOKEN: process.env.AFO_ASK_COPILOT_TOKEN,
            RUNTIME_SHARED_SECRET: process.env.RUNTIME_SHARED_SECRET,
            COPILOT_GITHUB_TOKEN: process.env.COPILOT_GITHUB_TOKEN,
          };

          for (const [name, value] of Object.entries(secrets)) {
            if (!value) {
              throw new Error(`Missing required runtime secret: ${name}`);
            }
          }

          fs.writeFileSync(secretFile, `${JSON.stringify(secrets)}\n`, {
            encoding: "utf8",
            mode: 0o600,
          });
          NODE
          echo "path=${secret_file}" >> "${GITHUB_OUTPUT}"

      - name: Deploy Worker and Container
        id: deploy
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_CONT_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRETS_FILE: ${{ steps.secret-file.outputs.path }}
          ROLLOUT: ${{ inputs.rollout }}
        run: |
          set -euo pipefail
          deploy_log="${RUNNER_TEMP}/wrangler-deploy.log"
          npx --yes "wrangler@${WRANGLER_VERSION}" deploy \
            --config apps/gateway/wrangler.jsonc \
            --secrets-file "${SECRETS_FILE}" \
            --containers-rollout "${ROLLOUT}" \
            --message "GitHub Actions ${GITHUB_SHA}" \
            2>&1 | tee "${deploy_log}"

          DEPLOY_LOG="${deploy_log}" node --input-type=module <<'NODE'
          import fs from "node:fs";

          const raw = fs.readFileSync(process.env.DEPLOY_LOG, "utf8");
          const text = raw.replace(/\u001b\[[0-9;]*m/g, "");
          const urls = [...text.matchAll(/https:\/\/[A-Za-z0-9.-]+\.workers\.dev/g)].map(
            (match) => match[0],
          );
          const workerUrl = urls.at(-1);

          if (!workerUrl) {
            throw new Error("Wrangler deployment output did not contain a workers.dev URL.");
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `worker_url=${workerUrl}\n`);
          console.log(`Worker URL: ${workerUrl}`);
          NODE

      - name: Remove ephemeral secrets file
        if: always()
        shell: bash
        env:
          SECRETS_FILE: ${{ steps.secret-file.outputs.path }}
        run: |
          if [[ -n "${SECRETS_FILE:-}" ]]; then
            rm -f -- "${SECRETS_FILE}"
          fi

      - name: Show deployment status
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_CONT_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes "wrangler@${WRANGLER_VERSION}" deployments list \
            --config apps/gateway/wrangler.jsonc
          npx --yes "wrangler@${WRANGLER_VERSION}" containers list

      - name: Run authenticated live smoke test
        env:
          WORKER_URL: ${{ steps.deploy.outputs.worker_url }}
          AFO_ASK_COPILOT_TOKEN: ${{ secrets.AFO_ASK_COPILOT_TOKEN }}
        run: node scripts/live-smoke.mjs
